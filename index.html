<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina G3 - Gestão Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #18181b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }

        @keyframes scan {
            0% { top: 10%; }
            100% { top: 90%; }
        }
        .animate-scan {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
            animation: scan 3s linear infinite alternate;
        }

        .tab-active {
            background-color: #ef4444 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(153, 27, 27, 0.4);
            transform: translateX(4px);
        }

        .mobile-tab-active {
            color: #ef4444 !important;
        }

        .login-bg {
            background: radial-gradient(circle at top right, #3f0a0a, transparent),
                        radial-gradient(circle at bottom left, #1a1a1e, #09090b);
        }

        .logo-img {
            object-fit: contain;
        }

        /* Nova classe para o autocomplete de clientes */
        .suggestion-box {
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }
    </style>
</head>
<body class="selection:bg-red-600/30">

    <div id="app-root" class="min-h-screen">
        <!-- Conteúdo injetado pelo JavaScript -->
    </div>

    <!-- Modal: Scan -->
    <div id="modal-scan" class="hidden fixed inset-0 z-50 bg-black/98 flex flex-col p-4 md:p-12 animate-in fade-in zoom-in duration-300">
        <div class="flex justify-between items-center mb-10 max-w-5xl mx-auto w-full">
            <div class="flex items-center gap-4">
                <div class="bg-zinc-800 p-2 rounded-xl">
                    <img src="https://raw.githubusercontent.com/weversonf/PDV-G3/refs/heads/main/logo_pdv_oficina_g3.png" alt="Logo G3" class="w-8 h-8 logo-img">
                </div>
                <div>
                    <h3 class="text-white font-black text-xl uppercase italic tracking-tighter">Digitalizar O.S. Papel</h3>
                    <p class="text-zinc-500 text-xs font-bold uppercase tracking-wider text-red-500">Mecanismo G3 Vision</p>
                </div>
            </div>
            <button onclick="toggleScanModal(false)" class="text-zinc-400 bg-zinc-900 hover:bg-zinc-800 p-3 rounded-2xl transition-colors">✕</button>
        </div>

        <div class="flex-1 flex flex-col lg:flex-row gap-12 items-center justify-center max-w-6xl mx-auto w-full">
            <div class="w-full max-w-md aspect-[3/4.5] border-2 border-zinc-800 rounded-[3rem] relative overflow-hidden bg-zinc-950 shadow-[0_0_50px_rgba(239,68,68,0.1)]">
                <div class="animate-scan"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-12">
                    <div class="w-full h-full border border-zinc-800/50 rounded-2xl flex flex-col items-center justify-center">
                        <i data-lucide="camera" class="text-zinc-800 w-12 h-12 mb-4"></i>
                        <p class="text-zinc-600 text-[10px] uppercase font-black tracking-widest px-6 leading-relaxed">Centralize o cabeçalho e os checklists marcados</p>
                    </div>
                </div>
            </div>
            <div class="max-w-xs w-full space-y-6">
                <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                    <p class="text-xs text-white font-black uppercase tracking-widest mb-4 italic">Como Funciona:</p>
                    <div class="space-y-4 text-[10px] text-zinc-400 font-bold uppercase leading-relaxed tracking-tight">
                        <div class="flex gap-3"><span class="text-red-500 font-black italic">01.</span><p>O sistema reconhece a placa escrita.</p></div>
                        <div class="flex gap-3"><span class="text-red-500 font-black italic">02.</span><p>Campos com "X" viram itens de O.S.</p></div>
                        <div class="flex gap-3"><span class="text-red-500 font-black italic">03.</span><p>Estoque baixa automaticamente.</p></div>
                    </div>
                </div>
                <button onclick="toggleScanModal(false)" class="w-full bg-red-600 text-white font-black py-5 rounded-3xl active:scale-95 transition-all shadow-2xl shadow-red-900/40 uppercase text-sm tracking-[0.2em]">
                    Capturar O.S.
                </button>
            </div>
        </div>
    </div>

    <!-- Modal: Checkout PDV -->
    <div id="modal-checkout" class="hidden fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-lg rounded-[2.5rem] border border-zinc-800 overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-zinc-800 bg-zinc-900/50 flex justify-between items-center">
                <div>
                    <h3 class="text-white font-black text-xl uppercase italic tracking-tighter">Finalizar Venda (PDV)</h3>
                    <p id="checkout-os-id" class="text-zinc-500 text-xs font-bold uppercase tracking-wider"></p>
                </div>
                <button onclick="toggleCheckoutModal(false)" class="text-zinc-500 text-xl font-bold">✕</button>
            </div>
            
            <div id="checkout-content" class="p-8 space-y-6">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Modal: Nova OS Manual -->
    <div id="modal-nova-os" class="hidden fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-lg rounded-[2.5rem] border border-zinc-800 overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-zinc-800 bg-zinc-900/50 flex justify-between items-center">
                <div>
                    <h3 class="text-white font-black text-xl uppercase italic tracking-tighter">Nova O.S. Manual</h3>
                    <p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Abertura de Chamado</p>
                </div>
                <button onclick="toggleNewOSModal(false)" class="text-zinc-500 text-xl font-bold">✕</button>
            </div>
            
            <form onsubmit="handleCreateOS(event)" class="p-8 space-y-4">
                <div>
                    <label class="text-[10px] text-zinc-600 uppercase font-black block mb-1">Placa do Veículo</label>
                    <input id="os-placa" type="text" required placeholder="ABC1234" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-bold outline-none focus:border-red-600 uppercase">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-zinc-600 uppercase font-black block mb-1">Montadora</label>
                        <select id="os-montadora" required onchange="updateModelosDropdown(this.value)" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-bold outline-none focus:border-red-600 appearance-none">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-zinc-600 uppercase font-black block mb-1">Modelo</label>
                        <select id="os-modelo" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-bold outline-none focus:border-red-600 appearance-none">
                            <option value="">Selecione a montadora...</option>
                        </select>
                    </div>
                </div>

                <div class="relative">
                    <label class="text-[10px] text-zinc-600 uppercase font-black block mb-1">Cliente</label>
                    <input id="os-cliente-input" type="text" required oninput="searchClients(this.value)" placeholder="Busque ou digite novo..." autocomplete="off" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-bold outline-none focus:border-red-600">
                    <div id="os-cliente-suggestions" class="hidden absolute left-0 right-0 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl suggestion-box shadow-2xl">
                        <!-- Suggestions go here -->
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-zinc-600 uppercase font-black block mb-1">Mecânico Responsável</label>
                    <select id="os-mecanico" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-bold outline-none focus:border-red-600 appearance-none">
                        <!-- Injected via JS -->
                    </select>
                </div>

                <button type="submit" class="w-full bg-red-600 text-white font-black py-4 rounded-3xl uppercase text-xs tracking-[0.2em] shadow-lg shadow-red-900/20 active:scale-95 transition-all">
                    Abrir O.S. (Ir para Orçamento)
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0XgGJebX5aWQnCSXOJc7VXtENpXwc6ds",
            authDomain: "g3sistema-a78bf.firebaseapp.com",
            projectId: "g3sistema-a78bf",
            storageBucket: "g3sistema-a78bf.firebasestorage.app",
            messagingSenderId: "1042020177225",
            appId: "1:1042020177225:web:a54c015fdc9be6f14e3698"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ESTADO GLOBAL ---
        let state = {
            isLoggedIn: false,
            activeTab: 'dashboard',
            nomeOficina: 'Oficina G3',
            corPrimaria: '#ef4444',
            logoUrl: 'https://raw.githubusercontent.com/weversonf/PDV-G3/refs/heads/main/logo_pdv_oficina_g3.png',
            user: null,
            // NOVOS DADOS PARA O.S.
            osViewMode: 'list', // 'list' ou 'edit'
            currentEditingOS: null,
            montadoras: {
                "Yamaha": ["Fazer 250", "Lander 250", "MT-03", "Factor 150", "NMax 160", "Crosser 150"],
                "Honda": ["CG 160 Titan", "CB 300F Twister", "XRE 300", "Biz 125", "PCX 150", "CB 500X"],
                "Suzuki": ["Yes 125", "V-Strom 650", "Burgman", "GSX-S750"],
                "Kawasaki": ["Ninja 400", "Z400", "Versys 650"],
                "BMW": ["G 310 GS", "F 850 GS", "R 1250 GS"]
            },
            clientes: [
                { id: 1, nome: "Weverson", fone: "8599999999" },
                { id: 2, nome: "Tiago Melo", fone: "8588888888" },
                { id: 3, nome: "Lucas Ribeiro", fone: "8577777777" }
            ],
            equipe: [
                { id: 1, nome: 'Zeca Mecânico', especialidade: 'Motor/Injeção', comissaoAtiva: true, taxa: 10, produzidos: 4500 },
                { id: 2, nome: 'Beto Suspensão', especialidade: 'Chassi/Freios', comissaoAtiva: true, taxa: 8, produzidos: 3200 },
                { id: 3, nome: 'Nando Ajudante', especialidade: 'Geral', comissaoAtiva: false, taxa: 0, produzidos: 1500 }
            ],
            estoque: [
                { id: 1, item: 'Óleo Motul 3000', custo: 28.00, venda: 45.00, qtd: 15 },
                { id: 2, item: 'Pastilha Freio Cobreq', custo: 18.00, venda: 40.00, qtd: 8 },
                { id: 3, item: 'Kit Relação DID', custo: 180.00, venda: 320.00, qtd: 3 }
            ],
            // Adicionado array "itens: []" para suportar a tela de orçamento
            osAtivas: [
                { id: 101, cliente: 'Lucas Ribeiro', placa: 'HTT4455', modelo: 'XRE 300', servico: 'Revisão Geral', status: 'Em execução', pecas: 120, maoDeObra: 530, mecanicoId: 1, itens: [] },
                { id: 102, cliente: 'Marcos Silva', placa: 'OFF1010', modelo: 'Bros 160', servico: 'Troca de Pneu', status: 'Pronta', pecas: 280, maoDeObra: 100, mecanicoId: 2, itens: [] },
                { id: 103, cliente: 'Ana Costa', placa: 'G3M1234', modelo: 'Ninja 400', servico: 'Troca de Óleo', status: 'Aguardando', pecas: 80, maoDeObra: 40, mecanicoId: 3, itens: [] }
            ],
            revisoes: [
                { id: 1, cliente: 'Weverson', placa: 'ABC1234', modelo: 'Fazer 250', status: 'Atrasada', faturamento: 450, whatsapp: '5585999999999' },
                { id: 2, cliente: 'Tiago Melo', placa: 'G3K2026', modelo: 'V-Strom 650', status: 'Hoje', faturamento: 1200, whatsapp: '5585888888888' }
            ]
        };

        // --- AUTENTICAÇÃO ---
        onAuthStateChanged(auth, (user) => {
            state.user = user;
            state.isLoggedIn = !!user;
            render();
        });

        window.handleLogin = async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                // Lógica de login: Se não for e-mail, completa com o domínio padrão do sistema
                const email = identifier.includes('@') ? identifier : `${identifier.toLowerCase().replace(/\s/g, '')}@oficinag3.com.br`;
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                console.error(error);
                alert("Erro ao entrar. Verifique se o usuário existe no Firebase Console.");
                btn.innerText = "ENTRAR NO SISTEMA";
                btn.disabled = false;
            }
        };

        window.handleLogout = async () => {
            await signOut(auth);
        };

        // --- LÓGICA DA NOVA O.S. (DROPDOWNS E AUTOCOMPLETE) ---
        window.updateModelosDropdown = (montadora) => {
            const select = document.getElementById('os-modelo');
            if (!montadora) {
                select.innerHTML = '<option value="">Selecione a montadora...</option>';
                return;
            }
            const modelos = state.montadoras[montadora] || [];
            select.innerHTML = modelos.map(m => `<option value="${m}">${m}</option>`).join('');
        };

        window.searchClients = (query) => {
            const suggestions = document.getElementById('os-cliente-suggestions');
            if (!query) {
                suggestions.classList.add('hidden');
                return;
            }
            const filtered = state.clientes.filter(c => c.nome.toLowerCase().includes(query.toLowerCase()));
            
            let html = filtered.map(c => `
                <div onclick="window.selectClient('${c.nome}')" class="p-3 hover:bg-zinc-800 cursor-pointer text-sm font-bold border-b border-zinc-800 last:border-0 text-white">
                    ${c.nome}
                </div>
            `).join('');

            if (filtered.length === 0) {
                html = `
                    <div onclick="window.addNewClient('${query}')" class="p-3 hover:bg-red-600/20 cursor-pointer text-sm font-bold text-red-500 italic">
                        + Cadastrar novo: "${query}"
                    </div>
                `;
            }

            suggestions.innerHTML = html;
            suggestions.classList.remove('hidden');
        };

        window.selectClient = (nome) => {
            document.getElementById('os-cliente-input').value = nome;
            document.getElementById('os-cliente-suggestions').classList.add('hidden');
        };

        window.addNewClient = (nome) => {
            state.clientes.push({ id: Date.now(), nome: nome, fone: "" });
            window.selectClient(nome);
        };

        window.toggleNewOSModal = (show) => {
            const modal = document.getElementById('modal-nova-os');
            if (show) {
                // Carrega montadoras
                const montadoraSelect = document.getElementById('os-montadora');
                montadoraSelect.innerHTML = '<option value="">Selecione...</option>' + 
                    Object.keys(state.montadoras).map(m => `<option value="${m}">${m}</option>`).join('');
                
                // Carrega mecânicos
                const mecSelect = document.getElementById('os-mecanico');
                mecSelect.innerHTML = state.equipe.map(m => `<option value="${m.id}">${m.nome}</option>`).join('');
                
                // Reseta campos
                document.getElementById('os-placa').value = '';
                document.getElementById('os-cliente-input').value = '';
                document.getElementById('os-modelo').innerHTML = '<option value="">Selecione a montadora...</option>';
                
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        window.handleCreateOS = (e) => {
            e.preventDefault();
            const newOS = {
                id: Math.floor(1000 + Math.random() * 9000), // ID aleatório p/ exemplo
                placa: document.getElementById('os-placa').value.toUpperCase(),
                modelo: document.getElementById('os-modelo').value,
                cliente: document.getElementById('os-cliente-input').value,
                mecanicoId: parseInt(document.getElementById('os-mecanico').value),
                servico: "Orçamento em aberto",
                status: 'Aguardando',
                pecas: 0,
                maoDeObra: 0,
                itens: []
            };
            state.osAtivas.unshift(newOS);
            window.toggleNewOSModal(false);
            window.openOSEditor(newOS.id);
        };

        window.openOSEditor = (osId) => {
            state.currentEditingOS = state.osAtivas.find(o => o.id === osId);
            state.osViewMode = 'edit';
            render();
        };

        window.addItemToOS = () => {
            const desc = prompt("Descrição do serviço ou peça:");
            if (!desc) return;
            const valor = parseFloat(prompt("Valor Unitário (R$):", "0"));
            const qtd = parseInt(prompt("Quantidade:", "1"));
            
            const totalItem = valor * qtd;
            state.currentEditingOS.itens.push({ desc, valor, qtd, total: totalItem });
            
            // Para simplificar no protótipo, jogamos o valor no total de "maoDeObra" e "pecas" (aqui somando tudo)
            state.currentEditingOS.maoDeObra = state.currentEditingOS.itens.reduce((acc, i) => acc + i.total, 0);
            
            render();
        };

        // --- NAVEGAÇÃO E MODAIS ---
        window.switchTab = (tabId) => {
            state.activeTab = tabId;
            state.osViewMode = 'list'; // Sempre reseta a view de OS para a lista
            render();
        };

        window.toggleScanModal = (show) => {
            const modal = document.getElementById('modal-scan');
            modal.classList.toggle('hidden', !show);
        };

        window.toggleCheckoutModal = (show, osId = null) => {
            const modal = document.getElementById('modal-checkout');
            if (show) {
                const os = state.osAtivas.find(o => o.id === osId);
                const mecanico = state.equipe.find(m => m.id === os.mecanicoId);
                const comissaoVal = os.maoDeObra * (mecanico.taxa / 100);
                
                document.getElementById('checkout-os-id').innerText = `Fecho de O.S. #${os.id}`;
                document.getElementById('checkout-content').innerHTML = `
                    <div class="space-y-3 text-center">
                        <div class="flex justify-between text-zinc-400 text-sm font-medium">
                            <span>Peças e Insumos</span>
                            <span class="font-mono text-white">R$ ${os.pecas.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-zinc-400 text-sm font-medium">
                            <span>Mão de Obra (${mecanico.nome})</span>
                            <span class="font-mono text-white">R$ ${os.maoDeObra.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-zinc-800">
                            <span class="text-zinc-500 font-black uppercase text-xs tracking-widest">Total a Receber</span>
                            <span class="text-3xl font-black text-emerald-500 italic">R$ ${(os.pecas + os.maoDeObra).toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-800 space-y-2 text-center">
                        <p class="text-[10px] text-zinc-600 font-black uppercase tracking-widest mb-2 italic">Repartição G3</p>
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-zinc-500 uppercase">COMISSÃO MECÂNICO (${mecanico.taxa}%):</span>
                            <span class="text-orange-500">R$ ${comissaoVal.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-zinc-500 uppercase">LUCRO LÍQUIDO OFICINA:</span>
                            <span class="text-blue-400">R$ ${(os.pecas + os.maoDeObra - comissaoVal).toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="finalizarOS(${os.id})" class="flex flex-col items-center justify-center p-4 bg-zinc-800 rounded-2xl border-2 border-transparent hover:border-emerald-500 transition-all">
                            <i data-lucide="banknote" class="text-zinc-500 mb-2"></i>
                            <span class="text-[8px] font-black uppercase">Dinheiro</span>
                        </button>
                        <button onclick="finalizarOS(${os.id})" class="flex flex-col items-center justify-center p-4 bg-zinc-800 rounded-2xl border-2 border-transparent hover:border-blue-500 transition-all">
                            <i data-lucide="credit-card" class="text-zinc-500 mb-2"></i>
                            <span class="text-[8px] font-black uppercase">Cartão</span>
                        </button>
                        <button onclick="finalizarOS(${os.id})" class="flex flex-col items-center justify-center p-4 bg-zinc-800 rounded-2xl border-2 border-transparent hover:border-purple-500 transition-all">
                            <i data-lucide="qr-code" class="text-zinc-500 mb-2"></i>
                            <span class="text-[8px] font-black uppercase">Pix</span>
                        </button>
                    </div>
                `;
                lucide.createIcons();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        window.finalizarOS = (osId) => {
            state.osAtivas = state.osAtivas.filter(o => o.id !== osId);
            window.toggleCheckoutModal(false);
            window.switchTab('dashboard'); // Volta pro painel após fechar
        };

        // --- RENDERIZADORES ---
        function render() {
            const root = document.getElementById('app-root');
            if (!state.isLoggedIn) {
                root.innerHTML = renderLogin();
            } else {
                root.innerHTML = renderAppStructure();
                renderTabContent();
            }
            lucide.createIcons();
        }

        function renderLogin() {
            return `
                <div class="min-h-screen login-bg flex items-center justify-center p-6">
                    <div class="w-full max-w-md bg-zinc-900/50 backdrop-blur-xl p-10 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
                        <div class="text-center mb-10">
                            <div class="bg-white/5 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl border border-white/10">
                                <img src="${state.logoUrl}" alt="Logo G3" class="w-12 h-12 logo-img">
                            </div>
                            <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">Oficina G3</h2>
                            <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mt-2 italic">Management System</p>
                        </div>

                        <form onsubmit="handleLogin(event)" class="space-y-6">
                            <div>

        function renderTabContent() {
            const content = document.getElementById('main-content');
            if (!content) return;

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('tab-active'));
            document.querySelectorAll('.mobile-nav-item').forEach(el => el.classList.remove('mobile-tab-active'));
            
            document.getElementById(`nav-${state.activeTab}`)?.classList.add('tab-active');
            document.getElementById(`m-nav-${state.activeTab}`)?.classList.add('mobile-tab-active');

            if (state.activeTab === 'dashboard') content.innerHTML = renderDashboard();
            if (state.activeTab === 'equipe') content.innerHTML = renderEquipe();
            if (state.activeTab === 'estoque') content.innerHTML = renderEstoque();
            if (state.activeTab === 'print') content.innerHTML = renderPrint();
            if (state.activeTab === 'config') content.innerHTML = renderConfig();
            
            // Lógica de Renderização do Módulo OS
            if (state.activeTab === 'os') {
                content.innerHTML = state.osViewMode === 'list' ? renderOSList() : renderOSEditor();

            lucide.createIcons();

            `;
        }

        function renderPrint() {
            return `
                <div class="p-4 md:p-8 space-y-8 max-w-4xl mx-auto text-center">
                    <div class="bg-zinc-900 p-12 rounded-[2.5rem] border border-zinc-800 shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-red-600"></div>
                        <i data-lucide="printer" class="mx-auto text-zinc-700 w-12 h-12 mb-6"></i>
                        <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">Guia de Entrada G3</h2>
                        <button class="mt-8 bg-white text-black font-black py-4 px-12 rounded-2xl hover:bg-zinc-200 uppercase text-sm tracking-widest shadow-xl">Imprimir Modelo</button>
                    </div>
                </div>
            `;
        }

        function renderConfig() {
            return `
                <div class="p-8 space-y-8 max-w-xl mx-auto">
                    <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">Ajustes</h2>
                    <div class="bg-zinc-900 p-8 rounded-[2rem] border border-zinc-800 space-y-6 shadow-xl">
                        <div>
                            <label class="text-[10px] text-zinc-600 uppercase font-black tracking-widest block mb-2">Oficina</label>
                            <input id="config-nome" type="text" value="${state.nomeOficina}" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl p-4 text-white font-bold focus:border-red-600 outline-none">
                        </div>
                        <button onclick="window.saveConfig()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest">Salvar</button>
                    </div>
                </div>
            `;
        }

        window.saveConfig = () => {
            state.nomeOficina = document.getElementById('config-nome').value;
            render();
        };

        // --- INIT ---
        window.onload = () => {
            render();
        };
    </script>
</body>
</html>
